name: Release

# Publishes to PyPI when a version tag is pushed, e.g.:
#   git tag v0.1.0 && git push origin v0.1.0
#
# Uses PyPI Trusted Publishing (OIDC) — no API tokens/secrets required.
# One-time setup on PyPI: https://pypi.org/manage/account/publishing/
#   Project: pydynantic
#   Owner:   robertruben98   Repo: pydynantic
#   Workflow: release.yml     Environment: pypi

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Verify tag matches the package version
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          PKG=$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          echo "tag=$TAG package=$PKG"
          test "$TAG" = "$PKG" || { echo "::error::Tag '$TAG' does not match project version '$PKG'"; exit 1; }

      - name: Build sdist and wheel
        run: |
          python -m pip install --upgrade build
          python -m build

      - name: Check distribution metadata
        run: |
          python -m pip install --upgrade twine
          python -m twine check dist/*

      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/pydynantic/
    permissions:
      id-token: write   # required for Trusted Publishing
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
