name: Release

# Publishes to PyPI when a version tag is pushed (with or without a leading
# "v"), e.g. `v0.1.0` or `0.1.0`. Can also be run manually from the Actions tab
# (workflow_dispatch) to publish whatever version is in pyproject.toml on main.
#
# Uses PyPI Trusted Publishing (OIDC) — no API tokens/secrets required.
# One-time setup on PyPI: https://pypi.org/manage/account/publishing/
#   Project: pydynantic
#   Owner:   robertruben98   Repo: pydynantic
#   Workflow: release.yml     Environment: pypi

on:
  push:
    tags:
      - "v*"
      - "[0-9]*"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6.3.0
        with:
          python-version: "3.12"

      - name: Verify tag matches the package version
        if: github.ref_type == 'tag'
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          PKG=$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          echo "tag=$TAG package=$PKG"
          test "$TAG" = "$PKG" || { echo "::error::Tag '$TAG' does not match project version '$PKG'"; exit 1; }

      - name: Build sdist and wheel
        run: |
          python -m pip install --upgrade build
          python -m build

      - name: Check distribution metadata
        run: |
          python -m pip install --upgrade twine
          python -m twine check dist/*

      - uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/pydynantic/
    permissions:
      id-token: write   # required for Trusted Publishing
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b  # release/v1

  github-release:
    needs: publish
    if: github.ref_type == 'tag'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7

      - name: Extract release notes from CHANGELOG
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          awk -v v="$VERSION" '$0 ~ "^## \\["v"\\]" {f=1;next} f && /^## \[/ {exit} f' CHANGELOG.md > release-notes.md

      - name: Create or update GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body_path: release-notes.md
          make_latest: true
